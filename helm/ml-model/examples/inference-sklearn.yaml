# Example: Simple Sklearn Model Inference Only
# Usage: helm install my-model ./helm/ml-model -f examples/inference-sklearn.yaml
# Note: Update the S3 bucket path to match your actual bucket and model location

inferenceService:
  enabled: true
  name: sklearn-model
  namespace: kserve
  
  model:
    name: sklearn-model
    format: sklearn
    # S3 path where the model is stored
    storageUri: "s3://mlops-trainig-679631209574-us-east-1-an/linear-regression/model.joblib"
  
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "256Mi"
  
  autoscaling:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

trainingJob:
  enabled: false

aws:
  s3:
    bucket: "mlops-trainig-679631209574-us-east-1-an"
    region: "us-east-1"
    # Note: IAM role ARN for S3 access - configured by EKS node role policy
    roleArn: "arn:aws:iam::679631209574:role/ml-ops-cluster-eks-node-role"

configMap:
  enabled: true
  data:
    model_type: "linear_regression"
    model_version: "1.0.0"
    training_framework: "scikit-learn"
