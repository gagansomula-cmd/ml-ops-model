name: Terraform Deploy with OIDC

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '~> 1.6'

      - name: Terraform Format Check
        run: terraform fmt -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init
        env:
          AWS_REGION: us-east-1

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          AWS_REGION: us-east-1

      - name: Terraform Apply
        run: terraform apply tfplan
        env:
          AWS_REGION: us-east-1

      - name: Debug - Check Terraform Outputs
        run: |
          echo "Available outputs:"
          terraform output
        continue-on-error: true

      - name: Get EKS Cluster Endpoint
        id: eks
        run: |
          echo "Waiting for cluster to be ready..."
          sleep 30
          
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          if [ -z "$CLUSTER_NAME" ]; then
            echo "ERROR: cluster_name output not found"
            terraform output
            exit 1
          fi
          
          echo "Cluster name: $CLUSTER_NAME"
          
          # Verify cluster exists
          if ! aws eks describe-cluster --name $CLUSTER_NAME --region us-east-1 &>/dev/null; then
            echo "ERROR: Cluster $CLUSTER_NAME not found in AWS"
            exit 1
          fi
          
          ENDPOINT=$(aws eks describe-cluster --name $CLUSTER_NAME --region us-east-1 --query cluster.endpoint --output text)
          echo "Cluster endpoint: $ENDPOINT"
          echo "cluster_endpoint=$ENDPOINT" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "Updating kubeconfig for cluster: $CLUSTER_NAME"
          aws eks update-kubeconfig --name $CLUSTER_NAME --region us-east-1
        continue-on-error: true

      - name: Verify EKS Deployment
        run: |
          echo "Testing kubectl connectivity..."
          kubectl cluster-info || echo "Cluster info failed, but continuing..."
          kubectl get nodes || echo "Note: Nodes not yet visible, EKS may still be initializing"
          kubectl get pods -A || echo "Pods not yet visible"
        continue-on-error: true

      - name: Upload Terraform Plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
