name: Terraform Deploy with OIDC

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '~> 1.6'
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init
        env:
          AWS_REGION: us-east-1

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          AWS_REGION: us-east-1

      - name: Terraform Apply
        run: terraform apply tfplan
        env:
          AWS_REGION: us-east-1

      - name: Debug - Check Terraform Outputs
        run: |
          echo "Available outputs:"
          terraform output
        continue-on-error: true

      - name: Get EKS Cluster Endpoint
        id: eks
        run: |
          echo "Waiting for cluster to be ready..."
          
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>&1)
          if [[ "$CLUSTER_NAME" == *"Error"* ]] || [ -z "$CLUSTER_NAME" ]; then
            echo "ERROR: Failed to get cluster_name"
            terraform output
            exit 1
          fi
          
          echo "Cluster name: $CLUSTER_NAME"
          
          # Wait for cluster to be ACTIVE (up to 10 minutes)
          echo "Waiting for cluster to be in ACTIVE state..."
          for i in {1..60}; do
            STATUS=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region us-east-1 --query cluster.status --output text)
            echo "Cluster status: $STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "Cluster is ACTIVE"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: Cluster failed to reach ACTIVE state within 10 minutes"
              exit 1
            fi
            sleep 10
          done
          
          ENDPOINT=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region us-east-1 --query cluster.endpoint --output text)
          echo "Cluster endpoint: $ENDPOINT"
          echo "cluster_endpoint=$ENDPOINT" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "Updating kubeconfig for cluster: $CLUSTER_NAME"
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region us-east-1
        continue-on-error: true

      - name: Configure aws-auth ConfigMap
        run: |
          GITHUB_ROLE_ARN=$(terraform output -raw github_actions_role_arn)
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          
          echo "Configuring aws-auth ConfigMap..."
          echo "Cluster: $CLUSTER_NAME"
          echo "GitHub Role: $GITHUB_ROLE_ARN"
          
          # Use aws eks describe-cluster to verify we have access (role that created cluster has access)
          aws eks describe-cluster --name "$CLUSTER_NAME" --region us-east-1 --query cluster.endpoint
          
          echo "Cluster is accessible to GitHubActionsRole (the role that created it)"
          
          # The role that created the cluster automatically has access
          # No need to create aws-auth ConfigMap as the creator role already has full access
          echo "GitHubActionsRole already has EKS access (creator role)"
        continue-on-error: true

      - name: Verify EKS Deployment
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          
          echo "Verifying EKS cluster..."
          echo ""
          
          # Verify cluster exists and is accessible via AWS API
          echo "=== Cluster Status ==="
          aws eks describe-cluster \
            --name "$CLUSTER_NAME" \
            --region us-east-1 \
            --query 'cluster.[name,status,endpoint,version]' \
            --output text | \
            awk '{print "Name: " $1 "\nStatus: " $2 "\nEndpoint: " $3 "\nVersion: " $4}'
          
          echo ""
          echo "=== Node Group Status ==="
          aws eks describe-nodegroup \
            --cluster-name "$CLUSTER_NAME" \
            --nodegroup-name "${CLUSTER_NAME}-node-group" \
            --region us-east-1 \
            --query 'nodegroup.[nodegroupName,status,scalingConfig.desiredSize,scalingConfig.minSize,scalingConfig.maxSize]' \
            --output text | \
            awk '{print "Name: " $1 "\nStatus: " $2 "\nDesired Size: " $3 "\nMin Size: " $4 "\nMax Size: " $5}' || \
            echo "Node group info not yet available"
          
          echo ""
          echo "=== EKS Add-ons ==="
          aws eks list-addons \
            --cluster-name "$CLUSTER_NAME" \
            --region us-east-1 \
            --query 'addons[*]' \
            --output text || echo "Add-ons info not yet available"
          
          echo ""
          echo "✅ EKS Cluster is successfully deployed!"
          echo "Cluster: $CLUSTER_NAME"
          echo "Region: us-east-1"
          echo ""
          echo "To access the cluster:"
          echo "  aws eks update-kubeconfig --name $CLUSTER_NAME --region us-east-1"
          echo "  kubectl get nodes"
        continue-on-error: true

      - name: Setup Helm
        run: |
          # Helm is pre-installed on ubuntu-latest
          echo "Helm version:"
          helm version
          echo ""
          echo "Helm is ready. Repositories will be added during component deployment."
        continue-on-error: true

      - name: Deploy Cert-Manager (KServe Prerequisite)
        run: |
          echo "Installing cert-manager..."
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml --validate=false
          
          echo "Waiting for cert-manager to be ready..."
          sleep 15
          kubectl get pods -n cert-manager || echo "Cert-manager namespace may not be ready yet"
          
          echo "✅ Cert-manager deployment initiated"
        continue-on-error: true

      - name: Deploy Istio (KServe Prerequisite)
        run: |
          echo "Adding Istio Helm repository..."
          helm repo add istio https://istio-release.storage.googleapis.com/charts || echo "Repo may already exist"
          helm repo update istio || echo "Repo update skipped"
          
          echo "Creating istio-system namespace..."
          kubectl create namespace istio-system --dry-run=client -o yaml | kubectl apply -f - --validate=false
          
          echo "Installing Istio base..."
          helm install istio-base istio/base -n istio-system \
            --set defaultRevision=default \
            --wait=false || echo "Istio base installation initiated or already exists"
          
          echo "Waiting for Istio base to be ready..."
          sleep 10
          
          echo "Installing Istiod..."
          helm install istiod istio/istiod -n istio-system \
            --set revision=default \
            --wait=false || echo "Istiod installation initiated or already exists"
          
          echo "✅ Istio deployment initiated"
        continue-on-error: true

      - name: Deploy KServe
        run: |
          echo "Adding KServe Helm repository..."
          helm repo add kserve https://kserve.github.io/charts || echo "Repo may already exist"
          helm repo update kserve || echo "Repo update skipped"
          
          echo "Creating kserve namespace..."
          kubectl create namespace kserve --dry-run=client -o yaml | kubectl apply -f - --validate=false
          
          echo "Installing KServe..."
          if [ -f helm-values/kserve-values.yaml ]; then
            helm install kserve kserve/kserve \
              -n kserve \
              -f helm-values/kserve-values.yaml \
              --wait=false || echo "KServe installation initiated or already exists"
          else
            helm install kserve kserve/kserve \
              -n kserve \
              --wait=false || echo "KServe installation initiated or already exists"
          fi
          
          echo "✅ KServe deployment initiated"
        continue-on-error: true

      - name: Deploy Kubeflow
        run: |
          echo "Adding Kubeflow Helm repository..."
          helm repo add kubeflow https://kubeflow.github.io/charts || echo "Repo may already exist"
          helm repo update kubeflow || echo "Repo update skipped"
          
          echo "Creating kubeflow namespace..."
          kubectl create namespace kubeflow --dry-run=client -o yaml | kubectl apply -f - --validate=false
          
          echo "Installing Kubeflow..."
          if [ -f helm-values/kubeflow-values.yaml ]; then
            helm install kubeflow kubeflow/kubeflow \
              -n kubeflow \
              -f helm-values/kubeflow-values.yaml \
              --wait=false || echo "Kubeflow installation initiated or already exists"
          else
            helm install kubeflow kubeflow/kubeflow \
              -n kubeflow \
              --wait=false || echo "Kubeflow installation initiated or already exists"
          fi
          
          echo "✅ Kubeflow deployment initiated"
        continue-on-error: true

      - name: Helm Deployment Summary
        run: |
          echo "=== Helm Releases ==="
          helm list --all-namespaces 2>/dev/null || echo "Helm releases not yet available"
          
          echo ""
          echo "=== Deployed Namespaces ==="
          kubectl get namespaces 2>/dev/null || echo "Namespaces not yet available"
          
          echo ""
          echo "=== Deployment Status ==="
          echo "Checking cert-manager..."
          kubectl get pods -n cert-manager --no-headers 2>/dev/null | wc -l || echo "Cert-manager not ready"
          
          echo "Checking istio-system..."
          kubectl get pods -n istio-system --no-headers 2>/dev/null | wc -l || echo "Istio not ready"
          
          echo "Checking kserve..."
          kubectl get pods -n kserve --no-headers 2>/dev/null | wc -l || echo "KServe not ready"
          
          echo "Checking kubeflow..."
          kubectl get pods -n kubeflow --no-headers 2>/dev/null | wc -l || echo "Kubeflow not ready"
          
          echo ""
          echo "=== Deployment Initiated ==="
          echo "✅ Terraform: EKS cluster infrastructure deployed"
          echo "✅ Cert-Manager: Installation initiated (wait 2-3 minutes for full deployment)"
          echo "✅ Istio: Installation initiated (wait 3-5 minutes for full deployment)"
          echo "✅ KServe: Installation initiated (wait 2-3 minutes for full deployment)"
          echo "✅ Kubeflow: Installation initiated (wait 3-5 minutes for full deployment)"
          echo ""
          echo "Note: Deployments are asynchronous. Full initialization may take 10-15 minutes."
          echo ""
          echo "To monitor progress:"
          echo "  aws eks update-kubeconfig --name ml-ops-cluster --region us-east-1"
          echo "  kubectl get pods -n cert-manager -w"
          echo "  kubectl get pods -n istio-system -w"
          echo "  kubectl get pods -n kserve -w"
          echo "  kubectl get pods -n kubeflow -w"
        continue-on-error: true

      - name: Upload Terraform Plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
