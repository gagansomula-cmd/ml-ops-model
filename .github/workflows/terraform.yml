        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "🔐 IAM ROLE-BASED AUTHENTICATION SUMMARY 🔐"
          echo "=========================================="
          echo ""
          echo "✅ Authentication Method:"
          echo "   - GitHub Actions → GitHub OIDC → AWS STS"
          echo "   - No hardcoded AWS access keys in repository"
          echo "   - Temporary credentials via GitHub OIDC"
          echo ""
          echo "✅ Terraform Deployment:"
          echo "   - Uses GitHubActionsRole for infrastructure provisioning"
          echo "   - Permissions: EKS, IAM, VPC, S3, Networking"
          echo ""
          echo "✅ EKS Cluster Access:"
          echo "   - aws-auth ConfigMap maps GitHubActionsRole → Kubernetes system:masters"
          echo "   - kubectl commands use IAM role (not token-based)"
          echo ""
          echo "✅ S3 Model Access:"
          echo "   - GitHub Actions: Uses github-actions-s3-models-access policy"
          echo "   - EKS Pods: Uses eks-s3-models-access policy (node role)"
          echo "   - KServe: Downloads models from S3 via IAM role"
          echo ""
          echo "✅ Python Scripts (prepare_model.py):"
          echo "   - Uses boto3 with IAM role credentials"
          echo "   - No AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY required"
          echo ""
          echo "📋 Required Terraform Outputs:"
          cd terraform
          echo ""
          echo "Cluster & IAM Configuration:"
          terraform output cluster_name 2>/dev/null || echo "  cluster_name: (not yet available)"
          terraform output github_actions_role_arn 2>/dev/null || echo "  github_actions_role_arn: (not yet available)"
          echo ""
          echo "S3 Access Information:"
          terraform output ml_models_bucket 2>/dev/null || echo "  ml_models_bucket: (not yet available)"
          echo ""
          echo "✅ Security Best Practices Applied:"
          echo "   1. ✓ No hardcoded credentials in code"
          echo "   2. ✓ OIDC for GitHub Actions authentication"
          echo "   3. ✓ Temporary STS tokens (auto-rotating)"
          echo "   4. ✓ IAM roles with least-privilege policies"
          echo "   5. ✓ aws-auth ConfigMap for Kubernetes RBAC"
          echo "   6. ✓ CloudTrail audit logging (via IAM roles)"
          echo ""
          echo "=========================================="
        continue-on-error: true
