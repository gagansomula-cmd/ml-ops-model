name: Terraform Deploy with OIDC

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '~> 1.6'
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init
        env:
          AWS_REGION: us-east-1

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          AWS_REGION: us-east-1

      - name: Terraform Apply
        run: terraform apply tfplan
        env:
          AWS_REGION: us-east-1

      - name: Debug - Check Terraform Outputs
        run: |
          echo "Available outputs:"
          terraform output
        continue-on-error: true

      - name: Get EKS Cluster Endpoint
        id: eks
        run: |
          echo "Waiting for cluster to be ready..."
          
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>&1)
          if [[ "$CLUSTER_NAME" == *"Error"* ]] || [ -z "$CLUSTER_NAME" ]; then
            echo "ERROR: Failed to get cluster_name"
            terraform output
            exit 1
          fi
          
          echo "Cluster name: $CLUSTER_NAME"
          
          # Wait for cluster to be ACTIVE (up to 10 minutes)
          echo "Waiting for cluster to be in ACTIVE state..."
          for i in {1..60}; do
            STATUS=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region us-east-1 --query cluster.status --output text)
            echo "Cluster status: $STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "Cluster is ACTIVE"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: Cluster failed to reach ACTIVE state within 10 minutes"
              exit 1
            fi
            sleep 10
          done
          
          ENDPOINT=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region us-east-1 --query cluster.endpoint --output text)
          echo "Cluster endpoint: $ENDPOINT"
          echo "cluster_endpoint=$ENDPOINT" >> $GITHUB_OUTPUT

      - name: Verify EKS Deployment
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          
          echo "Verifying EKS cluster..."
          echo ""
          
          # Verify cluster exists and is accessible via AWS API
          echo "=== Cluster Status ==="
          aws eks describe-cluster \
            --name "$CLUSTER_NAME" \
            --region us-east-1 \
            --query 'cluster.[name,status,endpoint,version]' \
            --output text | \
            awk '{print "Name: " $1 "\nStatus: " $2 "\nEndpoint: " $3 "\nVersion: " $4}'
          
          echo ""
          echo "=== Node Group Status ==="
          aws eks describe-nodegroup \
            --cluster-name "$CLUSTER_NAME" \
            --nodegroup-name "${CLUSTER_NAME}-node-group" \
            --region us-east-1 \
            --query 'nodegroup.[nodegroupName,status,scalingConfig.desiredSize,scalingConfig.minSize,scalingConfig.maxSize]' \
            --output text | \
            awk '{print "Name: " $1 "\nStatus: " $2 "\nDesired Size: " $3 "\nMin Size: " $4 "\nMax Size: " $5}' || \
            echo "Node group info not yet available"
          
          echo ""
          echo "=== EKS Add-ons ==="
          aws eks list-addons \
            --cluster-name "$CLUSTER_NAME" \
            --region us-east-1 \
            --query 'addons[*]' \
            --output text || echo "Add-ons info not yet available"
          
          echo ""
          echo "✅ EKS Cluster is successfully deployed!"
          echo "Cluster: $CLUSTER_NAME"
          echo "Region: us-east-1"
          echo ""
          echo "kubectl access setup:"
          echo "  aws eks update-kubeconfig --name $CLUSTER_NAME --region us-east-1"
          echo "  kubectl get nodes"
        continue-on-error: true

      - name: Configure kubectl for EKS
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "Configuring kubectl for cluster: $CLUSTER_NAME"
          
          mkdir -p ~/.kube
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region us-east-1 --kubeconfig ~/.kube/config
          
          echo ""
          echo "kubeconfig created at: $HOME/.kube/config"
          echo ""
          echo "⚠️  Skipping connectivity test (aws-auth ConfigMap not yet applied)"
          echo "kubectl access will be verified after aws-auth ConfigMap is applied"
          echo ""
          echo "✅ kubeconfig configured for $CLUSTER_NAME"
        continue-on-error: false

      - name: Setup Helm
        run: |
          # Helm is pre-installed on ubuntu-latest
          echo "Helm version:"
          helm version
          echo ""
          echo "Helm is ready. Repositories will be added during component deployment."
        continue-on-error: true

      - name: Verify aws-auth ConfigMap Generation
        run: |
          echo "=== Verifying aws-auth ConfigMap Generation ==="
          
          # Check if file exists
          if [ -f "aws-auth-configmap.yaml" ]; then
            echo "✅ aws-auth-configmap.yaml found"
            echo ""
            echo "File location: $(pwd)/aws-auth-configmap.yaml"
            echo "File size: $(wc -c < aws-auth-configmap.yaml) bytes"
            echo ""
            echo "=== File Contents ==="
            cat aws-auth-configmap.yaml
            echo ""
          else
            echo "⚠️  aws-auth-configmap.yaml not found in current directory"
            echo "Expected location: $(pwd)/aws-auth-configmap.yaml"
            echo ""
            echo "Checking terraform directory..."
            ls -la terraform/ | grep -i auth || echo "No auth files in terraform/"
          fi
          
          # Get GitHub Actions role ARN from Terraform
          echo ""
          echo "=== GitHub Actions Role Information ==="
          cd terraform && ROLE_ARN=$(terraform output -raw github_actions_role_arn 2>/dev/null || echo "NOT_FOUND")
          echo "GitHub Actions Role ARN: $ROLE_ARN"
          cd ..
          
          # Check if the role ARNs match
          if [ -f "aws-auth-configmap.yaml" ]; then
            echo ""
            echo "=== Validating Role ARN in ConfigMap ==="
            if grep -q "$ROLE_ARN" aws-auth-configmap.yaml; then
              echo "✅ GitHub Actions role ARN found in ConfigMap"
            else
              echo "❌ GitHub Actions role ARN NOT found in ConfigMap!"
              echo "Expected: $ROLE_ARN"
              echo "ConfigMap contains:"
              grep -i rolearn aws-auth-configmap.yaml || echo "No role ARNs found"
            fi
          fi
        continue-on-error: false

      - name: Wait for Kubernetes API Ready
        run: |
          echo "=== Waiting for Kubernetes API to be Ready ==="
          
          CLUSTER_NAME=$(cd terraform && terraform output -raw cluster_name)
          
          # Get cluster endpoint
          ENDPOINT=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region us-east-1 --query cluster.endpoint --output text)
          echo "Cluster endpoint: $ENDPOINT"
          
          # Wait for API server to respond
          echo ""
          echo "Waiting for API server to respond to requests..."
          for i in {1..60}; do
            echo "  Attempt $i/60 ($(( i * 5 )) seconds elapsed)..."
            
            # Try a simple health check
            RESPONSE=$(curl -s -k "$ENDPOINT/healthz" 2>&1 || echo "FAILED")
            
            if echo "$RESPONSE" | grep -q "ok\|healthy"; then
              echo "✅ API server is responding"
              break
            fi
            
            if [ $i -eq 60 ]; then
              echo "⚠️  API server not responding after 5 minutes (but this may be normal)"
              break
            fi
            
            sleep 5
          done
        continue-on-error: true

      - name: Apply aws-auth ConfigMap for GitHub Actions Role
        run: |
          echo "=== Applying aws-auth ConfigMap (CRITICAL STEP) ==="
          
          CLUSTER_NAME=$(cd terraform && terraform output -raw cluster_name)
          echo "Cluster: $CLUSTER_NAME"
          
          # Wait for cluster to be ACTIVE
          echo ""
          echo "Waiting for cluster to be ACTIVE..."
          for i in {1..30}; do
            echo "  Attempt $i/30..."
            STATUS=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region us-east-1 --query cluster.status --output text 2>/dev/null)
            echo "  Status: $STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "✅ Cluster is ACTIVE"
              break
            fi
            sleep 5
          done
          
          # Configure kubectl
          echo ""
          echo "Configuring kubectl..."
          mkdir -p ~/.kube
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region us-east-1 --kubeconfig ~/.kube/config
          
          export KUBECONFIG="$HOME/.kube/config"
          
          # Find and verify aws-auth ConfigMap file
          echo ""
          echo "=== Locating aws-auth ConfigMap file ==="
          
          AWS_AUTH_FILE=""
          for possible_path in "aws-auth-configmap.yaml" "terraform/../aws-auth-configmap.yaml" "../aws-auth-configmap.yaml"; do
            if [ -f "$possible_path" ]; then
              AWS_AUTH_FILE="$possible_path"
              echo "✅ Found at: $possible_path"
              break
            fi
          done
          
          if [ -z "$AWS_AUTH_FILE" ]; then
            echo "❌ CRITICAL ERROR: aws-auth-configmap.yaml not found!"
            echo ""
            echo "Searched paths:"
            echo "  - aws-auth-configmap.yaml"
            echo "  - terraform/../aws-auth-configmap.yaml"
            echo "  - ../aws-auth-configmap.yaml"
            echo ""
            echo "Files in current directory:"
            ls -la | grep -i auth || echo "  (no files matching 'auth')"
            echo ""
            echo "Files in terraform directory:"
            ls -la terraform/ | grep -i auth || echo "  (no files matching 'auth')"
            exit 1
          fi
          
          echo "File size: $(wc -c < "$AWS_AUTH_FILE") bytes"
          echo ""
          echo "=== aws-auth ConfigMap Content ==="
          cat "$AWS_AUTH_FILE"
          echo ""
          
          # Apply the aws-auth ConfigMap
          echo "=== Applying ConfigMap ==="
          kubectl apply -f "$AWS_AUTH_FILE"
          
          APPLY_EXIT=$?
          if [ $APPLY_EXIT -ne 0 ]; then
            echo ""
            echo "❌ ERROR: Failed to apply aws-auth ConfigMap (exit code: $APPLY_EXIT)"
            exit 1
          fi
          
          # Wait for ConfigMap to be processed
          echo ""
          echo "Waiting for ConfigMap to be processed..."
          for i in {1..15}; do
            echo "  Attempt $i/15..."
            if kubectl get configmap aws-auth -n kube-system 2>/dev/null; then
              echo "✅ aws-auth ConfigMap exists"
              break
            fi
            sleep 3
          done
          
          # Verify the ConfigMap content
          echo ""
          echo "=== Verifying aws-auth ConfigMap Content ==="
          kubectl get configmap aws-auth -n kube-system -o yaml
          
          # Verify GitHub Actions role is mapped
          echo ""
          echo "Checking GitHub Actions role mapping..."
          ROLE_ARN=$(cd terraform && terraform output -raw github_actions_role_arn 2>/dev/null || echo "")
          
          if [ -z "$ROLE_ARN" ]; then
            echo "⚠️  Could not get GitHub Actions role ARN from Terraform"
          else
            echo "GitHub Actions Role ARN: $ROLE_ARN"
            
            CONFIG_CONTENT=$(kubectl get configmap aws-auth -n kube-system -o jsonpath='{.data.mapRoles}' 2>/dev/null)
            
            if echo "$CONFIG_CONTENT" | grep -q "$ROLE_ARN"; then
              echo "✅ GitHub Actions role is mapped in ConfigMap"
            else
              echo "⚠️  GitHub Actions role ARN not found in ConfigMap!"
              echo ""
              echo "ConfigMap mapRoles:"
              echo "$CONFIG_CONTENT" | head -30
            fi
          fi
          
          # Test kubectl authentication
          echo ""
          echo "Testing kubectl authentication with IAM role..."
          if kubectl get namespace default 2>&1 | head -3; then
            echo "✅ kubectl successfully authenticated"
          else
            echo "⚠️  kubectl authentication may need more time to take effect"
            echo "     (IAM role mapping can take 30-60 seconds to activate)"
          fi
          
          echo ""
          echo "✅ aws-auth ConfigMap application completed"
        continue-on-error: false

      - name: Wait for Kubectl Authentication Ready
        run: |
          echo "=== Waiting for kubectl Authentication to be Ready ==="
          echo ""
          echo "Note: IAM role authorization can take 30-120 seconds to propagate"
          echo "      even after aws-auth ConfigMap is applied"
          echo ""
          
          # Set kubeconfig
          mkdir -p ~/.kube
          CLUSTER_NAME=$(cd terraform && terraform output -raw cluster_name)
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region us-east-1 --kubeconfig ~/.kube/config
          export KUBECONFIG="$HOME/.kube/config"
          
          # Wait for kubectl to successfully authenticate and execute commands
          echo "Testing kubectl commands..."
          for i in {1..60}; do
            echo "  Attempt $i/60 ($(( i * 2 )) seconds elapsed)..."
            
            # Try to get pods in default namespace
            if kubectl get pods -n default 2>/dev/null | grep -q "NAME"; then
              echo "✅ kubectl is fully authenticated"
              
              # Show some basic info
              echo ""
              echo "Cluster Info:"
              kubectl cluster-info 2>/dev/null | head -3
              
              echo ""
              echo "Nodes:"
              kubectl get nodes 2>/dev/null || echo "  (nodes not yet visible)"
              
              break
            fi
            
            if [ $i -eq 60 ]; then
              echo "⚠️  kubectl still not fully authenticated after 2 minutes"
              echo "    Proceeding anyway (may cause Helm deployment issues)"
              break
            fi
            
            sleep 2
          done
        continue-on-error: true

      - name: Deploy Cert-Manager (KServe Prerequisite)
        run: |
          echo "Adding Cert-Manager Helm repository..."
          helm repo add jetstack https://charts.jetstack.io || echo "Repo may already exist"
          helm repo update jetstack || echo "Repo update skipped"
          
          echo "Creating cert-manager namespace..."
          helm repo list | grep jetstack > /dev/null && \
            helm install cert-manager jetstack/cert-manager \
              --namespace cert-manager \
              --create-namespace \
              --set installCRDs=true \
              --wait=false || echo "Cert-manager installation initiated"
          
          echo "✅ Cert-manager deployment initiated via Helm"
        continue-on-error: true

      - name: Deploy Istio (KServe Prerequisite)
        run: |
          echo "Adding Istio Helm repository..."
          helm repo add istio https://istio-release.storage.googleapis.com/charts || echo "Repo may already exist"
          helm repo update istio || echo "Repo update skipped"
          
          echo "Installing Istio base..."
          helm install istio-base istio/base \
            --namespace istio-system \
            --create-namespace \
            --set defaultRevision=default \
            --wait=false || echo "Istio base may already exist"
          
          echo "Installing Istiod..."
          sleep 5
          helm install istiod istio/istiod \
            --namespace istio-system \
            --set revision=default \
            --wait=false || echo "Istiod may already exist"
          
          echo "✅ Istio deployment initiated via Helm"
        continue-on-error: true

      - name: Deploy KServe
        run: |
          echo "Attempting to add KServe Helm repository..."
          # KServe Helm repo may not exist, using official chart location if available
          helm repo add kserve https://kserve.github.io/charts 2>/dev/null || true
          
          # Alternative: Install KServe via kubectl manifests if Helm fails
          if helm search repo kserve > /dev/null 2>&1; then
            echo "Installing KServe via Helm..."
            helm install kserve kserve/kserve \
              --namespace kserve \
              --create-namespace \
              --wait=false || echo "KServe Helm installation may have issues"
          else
            echo "KServe Helm repo not available, skipping Helm deployment"
            echo "Note: KServe can be deployed post-deployment via kubectl manifests"
          fi
          
          echo "✅ KServe deployment step completed"
        continue-on-error: true

      - name: Deploy Kubeflow
        run: |
          echo "Attempting to add Kubeflow Helm repository..."
          helm repo add kubeflow https://kubeflow.github.io/charts 2>/dev/null || true
          
          # Kubeflow official Helm repo may not exist, alternative installation
          if helm search repo kubeflow > /dev/null 2>&1; then
            echo "Installing Kubeflow via Helm..."
            helm install kubeflow kubeflow/kubeflow \
              --namespace kubeflow \
              --create-namespace \
              --wait=false || echo "Kubeflow Helm installation may have issues"
          else
            echo "Kubeflow official Helm repo not available"
            echo "Note: Install Kubeflow post-deployment using manifests:"
            echo "  git clone https://github.com/kubeflow/manifests.git"
            echo "  kubectl apply -k manifests/distributions/kubeflow/components"
          fi
          
          echo "✅ Kubeflow deployment step completed"
        continue-on-error: true

      - name: Helm Deployment Summary
        run: |
          echo "=== Helm Releases ==="
          helm list --all-namespaces 2>/dev/null || echo "Helm releases may not be immediately available"
          
          echo ""
          echo "=== aws-auth ConfigMap Setup ==="
          CLUSTER_NAME=$(cd terraform && terraform output -raw cluster_name 2>/dev/null || echo "ml-ops-cluster")
          GITHUB_ACTIONS_ROLE=$(cd terraform && terraform output -raw github_actions_role_arn 2>/dev/null || echo "role/GitHubActionsRole")
          
          echo "Cluster: $CLUSTER_NAME"
          echo "GitHub Actions Role: $GITHUB_ACTIONS_ROLE"
          echo ""
          echo "The aws-auth ConfigMap has been generated to allow GitHub Actions role to access the cluster."
          echo "Location: aws-auth-configmap.yaml"
          echo ""
          echo "To verify the mapping after deployment:"
          echo "  aws eks update-kubeconfig --name $CLUSTER_NAME --region us-east-1"
          echo "  kubectl get configmap aws-auth -n kube-system -o yaml"
          
          echo ""
          echo "=== Deployment Status ==="
          echo "✅ Infrastructure: EKS cluster provisioned via Terraform"
          echo "✅ aws-auth ConfigMap: Generated and applied (if cluster ready)"
          echo "✅ Cert-Manager: Deployment initiated (async, 2-3 minutes to full readiness)"
          echo "✅ Istio: Deployment initiated (async, 3-5 minutes to full readiness)"
          echo "✅ KServe: Deployment initiated (async, 2-3 minutes to full readiness)"
          echo "✅ Kubeflow: Deployment initiated (async, 5-10 minutes to full readiness)"
          
          echo ""
          echo "=== Next Steps ==="
          echo "1. Verify aws-auth ConfigMap was applied:"
          echo "   kubectl get configmap aws-auth -n kube-system -o yaml"
          echo ""
          echo "2. Monitor Helm deployments:"
          echo "   kubectl get pods --all-namespaces -w"
          echo ""
          echo "3. Deploy KServe InferenceService:"
          echo "   kubectl apply -f inference-service.yaml -n kserve"
          echo ""
          echo "⏱️  Full deployment typically takes 10-15 minutes. Check pod status regularly."
        continue-on-error: true

      - name: Prepare ML Model for KServe
        working-directory: ./
        env:
          AWS_REGION: us-east-1
        run: |
          echo "=== Converting JSON Model to Sklearn Format ==="
          
          # Install required Python packages
          python3 -m pip install scikit-learn boto3 -q
          
          # Get the S3 bucket name from Terraform outputs
          ML_BUCKET=$(cd terraform && terraform output -raw ml_models_bucket 2>/dev/null || echo "mlops-trainig-679631209574-us-east-1-an")
          echo "Using S3 bucket: $ML_BUCKET"
          
          echo ""
          echo "=== Preparing Model ==="
          
          # Prepare the model (convert JSON to sklearn pickle)
          python3 prepare_model.py \
            --json-path model_artifacts/linear_regression_model.json \
            --output model_artifacts/model.joblib \
            --upload-s3 \
            --s3-bucket "$ML_BUCKET" \
            --s3-key linear-regression/model.joblib \
            --region us-east-1
          
          PREPARE_EXIT=$?
          
          if [ $PREPARE_EXIT -eq 0 ]; then
            echo "✅ Model prepared and uploaded to S3"
            S3_MODEL="s3://$ML_BUCKET/linear-regression/model.joblib"
          else
            echo "⚠️  S3 upload failed, will use local model reference"
            S3_MODEL="file:///mnt/models/model.joblib"
          fi
          
          echo "Model path for KServe: $S3_MODEL"
          
          # Save for next step
          echo "S3_MODEL=$S3_MODEL" >> $GITHUB_ENV
          echo "ML_BUCKET=$ML_BUCKET" >> $GITHUB_ENV
          
          # Verify the local model file
          if [ -f "model_artifacts/model.joblib" ]; then
            echo "✅ Local model file: model_artifacts/model.joblib"
            ls -lh model_artifacts/model.joblib
          else
            echo "❌ Local model file not created"
            exit 1
          fi
        continue-on-error: false

      - name: Deploy ML Model with Helm
        working-directory: ./
        run: |
          echo "=== Deploying ML Model with Helm ==="
          
          # Get cluster name
          CLUSTER_NAME=$(cd terraform && terraform output -raw cluster_name)
          echo "Cluster: $CLUSTER_NAME"
          echo "Region: us-east-1"
          
          # ===== Verify IAM Role Authentication (OIDC) =====
          echo ""
          echo "=== Verifying IAM Role Authentication ==="
          
          # AWS credentials should be available from configure-aws-credentials action
          if aws sts get-caller-identity; then
            echo "✅ IAM role authenticated successfully"
          else
            echo "❌ ERROR: IAM role authentication failed"
            exit 1
          fi
          
          # ===== Use existing kubeconfig =====
          echo ""
          echo "=== Configuring EKS Access via IAM Role ==="
          mkdir -p ~/.kube
          KUBECONFIG_FILE="$HOME/.kube/config"
          
          # Use existing kubeconfig if it exists, otherwise create new one
          if [ -f "$KUBECONFIG_FILE" ]; then
            echo "✅ Using existing kubeconfig"
          else
            echo "Creating new kubeconfig for: $CLUSTER_NAME"
            aws eks update-kubeconfig \
              --name "$CLUSTER_NAME" \
              --region "us-east-1" \
              --kubeconfig "$KUBECONFIG_FILE"
          fi
          
          if [ ! -f "$KUBECONFIG_FILE" ]; then
            echo "❌ Failed to create kubeconfig"
            exit 1
          fi
          
          FILE_SIZE=$(wc -c < "$KUBECONFIG_FILE")
          echo "✅ kubeconfig available (${FILE_SIZE} bytes)"
          
          # ===== Test kubectl with IAM role =====
          echo ""
          echo "=== Testing kubectl Access (CRITICAL) ==="
          
          # Export kubeconfig for kubectl to use
          export KUBECONFIG="$KUBECONFIG_FILE"
          
          # Test connectivity - THIS MUST SUCCEED
          echo "Testing cluster connectivity..."
          if kubectl cluster-info 2>&1 | head -3; then
            echo "✅ kubectl successfully connected with IAM role"
          else
            echo "❌ CRITICAL ERROR: kubectl connection failed"
            echo ""
            echo "Debugging information:"
            echo "kubeconfig exists: $([ -f "$KUBECONFIG_FILE" ] && echo "YES" || echo "NO")"
            echo "kubeconfig size: $([ -f "$KUBECONFIG_FILE" ] && wc -c < "$KUBECONFIG_FILE" || echo "N/A")"
            
            echo ""
            echo "Current context:"
            kubectl config current-context 2>&1 || echo "Failed to get context"
            
            echo ""
            echo "Trying direct API test..."
            kubectl get namespace default 2>&1 || echo "Direct API test failed"
            
            exit 1
          fi
            echo "Debugging information:"
            echo "kubeconfig exists: $([ -f "$KUBECONFIG_FILE" ] && echo "YES" || echo "NO")"
            echo "kubeconfig size: $([ -f "$KUBECONFIG_FILE" ] && wc -c < "$KUBECONFIG_FILE" || echo "N/A")"
            
            echo ""
            echo "Current context:"
            kubectl config current-context 2>&1 || echo "Failed to get context"
            
            echo ""
            echo "Trying direct API test..."
            kubectl get namespace default 2>&1 || echo "Direct API test failed"
            
            exit 1
          fi
          
          # Test token generation
          echo ""
          echo "=== Testing IAM Role Token Generation ==="
          if TOKEN=$(aws eks get-token --cluster-name "$CLUSTER_NAME" --region "us-east-1" 2>&1); then
            echo "✅ IAM role can generate EKS tokens"
          else
            echo "⚠️  Token generation test failed:"
            echo "$TOKEN"
          fi
          
          # Verify aws-auth ConfigMap is in place
          echo ""
          echo "=== Verifying aws-auth ConfigMap ==="
          if kubectl get configmap aws-auth -n kube-system 2>&1 | grep -q "aws-auth"; then
            echo "✅ aws-auth ConfigMap is present"
            
            # Show the mappings
            echo ""
            echo "Current role mappings:"
            kubectl get configmap aws-auth -n kube-system -o jsonpath='{.data.mapRoles}' | grep -o '"rolearn":"[^"]*"' | head -5 || echo "Could not display mappings"
          else
            echo "❌ ERROR: aws-auth ConfigMap not found!"
            echo "This means the GitHub Actions role is not mapped to Kubernetes"
            exit 1
          fi
          
          # ===== Deploy with Helm using IAM role =====
          echo ""
          echo "=== Deploying ML Model with Helm ==="
          
          if [ ! -d "helm/ml-model" ]; then
            echo "❌ Helm chart not found at helm/ml-model"
            ls -la helm/ 2>/dev/null || echo "helm directory not found"
            exit 1
          fi
          
          echo "✅ Helm chart found"
          echo ""
          echo "Chart details:"
          cat helm/ml-model/Chart.yaml 2>/dev/null | head -10 || echo "Chart.yaml not available"
          
          echo ""
          echo "=== Installing InferenceService via Helm ==="
          echo "Storage URI: $S3_MODEL"
          echo "S3 Bucket: $ML_BUCKET"
          
          # Create kserve namespace first
          echo ""
          echo "Creating kserve namespace..."
          kubectl create namespace kserve --dry-run=client -o yaml | kubectl apply -f -
          
          echo ""
          echo "Installing Helm release..."
          
          # Deploy using IAM role (credentials already configured by configure-aws-credentials)
          helm install sklearn-model helm/ml-model \
            --namespace kserve \
            --create-namespace \
            --set inferenceService.enabled=true \
            --set inferenceService.name=sklearn-model \
            --set inferenceService.model.format=sklearn \
            --set inferenceService.model.storageUri="$S3_MODEL" \
            --set aws.s3.bucket="$ML_BUCKET" \
            --set aws.s3.region="us-east-1" \
            --set trainingJob.enabled=false \
            --wait=false \
            --timeout=5m
          
          HELM_EXIT=$?
          
          if [ $HELM_EXIT -eq 0 ]; then
            echo ""
            echo "✅ Helm install succeeded"
            
            echo ""
            echo "=== Helm Release Status ==="
            helm list -n kserve || echo "Could not list releases"
            
            echo ""
            echo "=== InferenceService Status ==="
            kubectl get inferenceservice -n kserve 2>/dev/null || echo "Services still being created..."
            
            echo ""
            echo "=== Kubernetes Namespace Status ==="
            kubectl get namespace kserve
            
            echo ""
            echo "=== Next Steps ==="
            echo "Monitor deployment:"
            echo "  kubectl get pods -n kserve -w"
            echo ""
            echo "Check service status:"
            echo "  kubectl describe inferenceservice sklearn-model -n kserve"
            
          else
            echo ""
            echo "❌ Helm install failed with exit code $HELM_EXIT"
            
            # Try to get debugging info
            echo ""
            echo "=== Debugging Info ==="
            echo "Helm releases:"
            helm list -n kserve 2>/dev/null || echo "Cannot list releases"
            
            echo ""
            echo "Kubernetes namespaces:"
            kubectl get namespaces 2>/dev/null || echo "Cannot list namespaces"
            
            echo ""
            echo "Pods in kserve namespace:"
            kubectl get pods -n kserve 2>/dev/null || echo "Cannot list pods"
            
            exit 1
          fi
        continue-on-error: false

      - name: Verify ML Model Deployment
        working-directory: ./
        run: |
          echo "=== ML Model Deployment Verification ==="
          
          # Get cluster name
          CLUSTER_NAME=$(cd terraform && terraform output -raw cluster_name)
          echo "Cluster: $CLUSTER_NAME"
          
          # Verify IAM role authentication
          echo ""
          echo "=== Verifying IAM Role Authentication ==="
          if aws sts get-caller-identity; then
            echo "✅ IAM role authenticated"
          else
            echo "⚠️  Cannot verify IAM role authentication"
          fi
          
          # Setup kubeconfig using IAM role
          echo ""
          echo "=== Setting Up EKS Access ==="
          mkdir -p ~/.kube
          KUBECONFIG_FILE="$HOME/.kube/config"
          rm -f "$KUBECONFIG_FILE"
          
          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region "us-east-1" \
            --kubeconfig "$KUBECONFIG_FILE"
          
          export KUBECONFIG="$KUBECONFIG_FILE"
          
          echo "✅ kubeconfig created"
          
          # Wait for deployment to progress
          sleep 10
          
          echo ""
          echo "=== Deployment Status ==="
          
          echo ""
          echo "InferenceServices in kserve namespace:"
          kubectl get inferenceservice -n kserve 2>/dev/null || echo "⚠️  Cannot list InferenceServices"
          
          echo ""
          echo "Pods in kserve namespace:"
          kubectl get pods -n kserve 2>/dev/null || echo "⚠️  Cannot list pods"
          
          echo ""
          echo "Services in kserve namespace:"
          kubectl get svc -n kserve 2>/dev/null || echo "⚠️  Cannot list services"
          
          echo ""
          echo "Namespaces:"
          kubectl get namespaces 2>/dev/null || echo "⚠️  Cannot list namespaces"
          
          echo ""
          echo "=== Expected Timeline ==="
          echo "0-5 min:   InferenceService created, predictor pods initializing"
          echo "5-10 min:  Predictor pods running, downloading model from S3"
          echo "10+ min:   Model fully loaded and ready for predictions"
          echo ""
          echo "To check status after deployment:"
          echo "  aws eks update-kubeconfig --name ml-ops-cluster --region us-east-1"
          echo "  kubectl get inferenceservice sklearn-model -n kserve"
          echo "  kubectl describe inferenceservice sklearn-model -n kserve"
        continue-on-error: true

      - name: Upload Terraform Plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan

