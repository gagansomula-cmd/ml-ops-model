# MLflow Configuration File

# Tracking Server Configuration
[tracking_server]
host = 0.0.0.0
port = 5000
workers = 4
backend_store_uri = ./mlruns
default_artifact_root = ./artifacts

# Backend Store (File-based or SQL)
# For production, use: postgresql://user:password@localhost:5432/mlflow
# Default uses local file system (./mlruns)
[backend]
type = file

# Artifact Store Configuration
# For local development: ./artifacts
# For production: s3://bucket-name, gs://bucket-name, azure://container
[artifact_store]
type = local
path = ./artifacts

# Experiment Configuration
[experiment]
default_experiment_name = ml-ops-linear-regression
artifact_location = ./artifacts

# Security Configuration
[security]
# For production, set authentication enabled
auth_enabled = false

# Logging Configuration
[logging]
level = INFO
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

# Model Registry Configuration
[model_registry]
registry_store_uri = ./mlruns
default_tag = None

# Advanced Settings
[advanced]
# Maximum size of artifact upload (MB)
max_artifact_size = 5000
# Number of runs to display per page
pagination_size = 100
# Enable MLflow Pipelines
enable_pipelines = false
